version: "2"
sql:
- schema: "internal/app/gateway/postgres/migrations"
  queries: "internal/app/gateway/postgres/queries"
  engine: "postgresql"
  gen:
    go: 
      package: "sqlc"
      out: "internal/app/gateway/postgres/sqlc"
      sql_package: "pgx/v5"
      overrides:
      - db_type: "decimal"
        go_type: "float64"
      - db_type: "uuid"
        go_type: "github.com/google/uuid.UUID"